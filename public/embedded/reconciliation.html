<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reconciliation Center</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/erp-theme.css">
  <script src="/js/platform-detector.js"></script>
  <style>
    .recon-list { max-width: 1080px; margin: 1.5rem auto; }
    .recon-card { border: 1px solid #d0d7de; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
    .recon-card[data-severity="critical"] { border-left: 4px solid #cf222e; }
    .recon-card[data-severity="high"] { border-left: 4px solid #cf222e; }
    .recon-card[data-severity="medium"] { border-left: 4px solid #9a6700; }
    .recon-card[data-severity="low"] { border-left: 4px solid #1a7f37; }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 12px; font-size: 0.75rem; background: #eaeef2; }
    .badge[data-tone="sev-critical"], .badge[data-tone="sev-high"] { background: #ffd9d2; color: #8a1c10; }
    .badge[data-tone="sev-medium"] { background: #fff5cc; color: #6e4a00; }
    .badge[data-tone="sev-low"] { background: #d4f5dd; color: #156217; }
    .meta { color: #57606a; font-size: 0.85rem; margin: 0.5rem 0; }
    .actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; }
    .actions button { padding: 0.375rem 0.75rem; border-radius: 4px; cursor: pointer; }
    .actions button[data-act="resolve"] { background: #1a7f37; color: white; border: 1px solid #1a7f37; }
    .resolve-form { display: none; margin-top: 0.75rem; padding: 0.75rem; background: #f6f8fa; border-radius: 4px; }
    .resolve-form.expanded { display: block; }
    .resolve-form label { display: block; margin: 0.5rem 0 0.25rem; font-weight: 500; }
    .resolve-form textarea { width: 100%; padding: 0.375rem; box-sizing: border-box; min-height: 3em; }
    .empty-state { text-align: center; color: #57606a; padding: 3rem; }
    #error { color: #cf222e; padding: 0.75rem; border: 1px solid #cf222e; border-radius: 4px; margin: 1rem 0; }
    .refresh-info { text-align: right; color: #57606a; font-size: 0.85rem; margin: 0.5rem 0; }
  </style>
</head>
<body class="erp-body">
  <header class="erp-header">
    <div>
      <h1 class="erp-header-title">Reconciliation Center</h1>
      <p class="erp-header-subtitle">Open reconciliation exceptions for your tenant</p>
    </div>
  </header>
  <main class="recon-list">
    <p>Open reconciliation exceptions for your tenant. Resolving an exception records you as the resolver and removes it from this list.</p>
    <div class="refresh-info"><span id="lastRefresh"></span> <button type="button" id="refreshBtn">Refresh now</button></div>
    <div id="loading">Loading&hellip;</div>
    <div id="empty" class="empty-state" hidden></div>
    <div id="error" hidden role="alert"></div>
    <ol id="list" hidden></ol>
  </main>
  <script src="/embedded/guest-bootstrap.js"></script>
  <script src="/embedded/reconciliation.js"></script>
</body>
</html>
