<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Record Lineage</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/erp-theme.css">
  <script src="/js/platform-detector.js"></script>
  <style>
    .form-card { max-width: 720px; margin: 1.5rem auto; padding: 1rem; border: 1px solid #d0d7de; border-radius: 6px; background: #f6f8fa; }
    .form-card label { display: block; margin: 0.5rem 0 0.25rem; font-weight: 500; }
    .form-card input { width: 100%; padding: 0.375rem; box-sizing: border-box; border: 1px solid #d0d7de; border-radius: 4px; }
    .form-card button { margin-top: 0.75rem; padding: 0.5rem 1rem; cursor: pointer; }
    .chain { max-width: 720px; margin: 1.5rem auto; }
    .event { border: 1px solid #d0d7de; border-radius: 6px; padding: 0.75rem 1rem; margin-bottom: 0.75rem; background: #fff; }
    .event[data-type="source_read"]        { border-left: 4px solid #1a7f37; }
    .event[data-type="transform"]          { border-left: 4px solid #0969da; }
    .event[data-type="governance_decision"] { border-left: 4px solid #9a6700; }
    .event[data-type="target_write"]       { border-left: 4px solid #6639ba; }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 12px; font-size: 0.75rem; background: #eaeef2; }
    .sequence { font-family: monospace; color: #57606a; margin-left: 0.5rem; }
    .meta { font-size: 0.8rem; color: #57606a; margin-top: 0.5rem; }
    .empty-state, .error { text-align: center; padding: 2rem; }
    .error { color: #cf222e; border: 1px solid #cf222e; border-radius: 4px; }
    code { background: #f6f8fa; padding: 0.125rem 0.25rem; border-radius: 3px; font-size: 0.85rem; word-break: break-all; }
  </style>
</head>
<body class="erp-body">
  <header class="erp-header">
    <div>
      <h1 class="erp-header-title">Record Lineage</h1>
      <p class="erp-header-subtitle">Source → transform → governance → target chain per record</p>
    </div>
  </header>
  <main>
    <section class="form-card">
      <p>Look up the source &rarr; transform &rarr; governance &rarr; target chain recorded by <code>FlowExecutor</code> for a single record.</p>
      <label for="system-input">Source system</label>
      <input id="system-input" type="text" autocomplete="off" placeholder="netsuite, hubspot, &hellip;" />
      <label for="entity-type-input">Entity type</label>
      <input id="entity-type-input" type="text" autocomplete="off" placeholder="customer, contact, &hellip;" />
      <label for="entity-id-input">Entity id</label>
      <input id="entity-id-input" type="text" autocomplete="off" placeholder="external record id" />
      <button id="lookup-btn" type="button">Look up chain</button>
    </section>
    <section class="chain">
      <div id="loading" hidden>Loading&hellip;</div>
      <div id="empty" class="empty-state" hidden>No chain found for the supplied record.</div>
      <div id="error" class="error" role="alert" hidden></div>
      <ol id="events" hidden></ol>
    </section>
  </main>
  <script src="/embedded/guest-bootstrap.js"></script>
  <script src="/embedded/lineage.js"></script>
</body>
</html>
