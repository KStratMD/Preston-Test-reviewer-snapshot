  # Hard case: Account.Id is the SFDC record's own identifier. The taught
  # COMMON_MAPPING_EXAMPLES pattern is account_id → entityId, but in a real
  # SFDC→NS sync the Salesforce record Id is stored as the NetSuite
  # externalId (the cross-system correlation key), while entityId comes from
  # AccountNumber (see "Financial and Sizing Fields" above). Tests whether
  # the model discriminates the integration-key role from the display-ID
  # role. IsPersonAccount → isPerson rounds out the person/company split.
  - name: "Integration Keys and Payee"
    sourceFields:
      - name: "Account.Id"
        type: "string"
        sample: "0011x00000GVfPzAAL"
      - name: "Account.IsPersonAccount"
        type: "boolean"
        sample: "false"
      - name: "Account.Check_Payee_Name__c"
        type: "string"
        sample: "Acme Corp Holdings LLC"
      - name: "Account.Resale_License_Number__c"
        type: "string"
        sample: "SR-CA-445812"
    expectedMappings:
      - source: "Account.Id"
        target: "externalId"
        confidence: 0.75
      - source: "Account.IsPersonAccount"
        target: "isPerson"
        confidence: 0.90
      - source: "Account.Check_Payee_Name__c"
        target: "printOnCheckAs"
        confidence: 0.80
      - source: "Account.Resale_License_Number__c"
        target: "resaleNumber"
        confidence: 0.85
