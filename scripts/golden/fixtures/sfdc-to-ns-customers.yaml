# Golden Set Test Cases: Salesforce to NetSuite Customers
#
# Data-leakage guard: NONE of the (sourceField, targetField) pairs below may
# appear in src/services/ai/prompts/FieldMappingPrompts.ts COMMON_MAPPING_EXAMPLES.
# Enforced by tests/unit/scripts/run-ai-accuracy-benchmark.dataLeakage.test.ts.
#
# Coverage philosophy: 22 testCases / 61 labeled mappings across the field
# families a real SFDC→NS customer sync touches in production (identity,
# address, contact, financial, tax, currency, ownership, audit, contact
# person, marketing attribution, lifecycle, pricing/ops — the last four added
# in Phase B widening). Each testCase exercises a small group of related
# fields rather than a single pair, so labeled-mapping count is the
# load-bearing unit of coverage that the data-leakage drift test pins
# against. Targets are NetSuite Customer record field names per SuiteScript
# record schema.

testSuite:
  name: "SFDC Account to NetSuite Customer Mapping"
  sourceSystem: "salesforce"
  targetSystem: "netsuite"
  entityType: "customers"

testCases:
  - name: "Core Identity Fields"
    sourceFields:
      - name: "Account.Name"
        type: "string"
        sample: "Acme Corporation"
      - name: "Account.Website"
        type: "string"
        sample: "www.acme.com"
      - name: "Account.Phone"
        type: "phone"
        sample: "+1-555-0100"
    expectedMappings:
      - source: "Account.Name"
        target: "companyName"
        confidence: 0.95
      - source: "Account.Website"
        target: "url"
        confidence: 0.90
      - source: "Account.Phone"
        target: "phone"
        confidence: 0.95

  - name: "Billing Address Fields"
    sourceFields:
