      - name: "Account.BillingState"
        type: "string"
        sample: "CA"
      - name: "Account.BillingPostalCode"
        type: "string"
        sample: "94105"
      - name: "Account.BillingCountry"
        type: "string"
        sample: "USA"
    expectedMappings:
