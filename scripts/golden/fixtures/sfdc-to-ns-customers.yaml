        target: "billAddr1"
        confidence: 0.90
      - source: "Account.BillingCity"
        target: "billCity"
        confidence: 0.95
      - source: "Account.BillingState"
        target: "billState"
        confidence: 0.95
      - source: "Account.BillingPostalCode"
        target: "billZip"
        confidence: 0.90
      - source: "Account.BillingCountry"
